services:
  - type: web
    name: orbit-ops-api
    env: node
    buildCommand: pnpm --dir apps/api build
    startCommand: pnpm --dir apps/api start
    envVars:
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: orbit-ops-db
          property: connectionString

  - type: web
    name: orbit-ops-web
    env: static
    buildCommand: pnpm --dir apps/web build
    staticPublishPath: ./apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: orbit-ops-api
          property: url

databases:
  - name: orbit-ops-db
    databaseName: orbit_ops
    user: orbit_user
